<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>東西新報 ミタニ市長選 世論調査結果</title>

  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background: #f4f4f4;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: #fff;
      padding: 28px;
      border-radius: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }

    h1 {
      text-align: center;
      margin-bottom: 8px;
      font-size: 28px;
    }

    .lead {
      text-align: center;
      color: #555;
      margin-bottom: 32px;
    }

    .section {
      margin: 42px 0;
    }

    h2 {
      text-align: center;
      font-size: 22px;
      margin-bottom: 24px;
    }

    .bar-row {
      display: flex;
      align-items: center;
      margin: 16px 0;
      gap: 12px;
    }

    .label {
      width: 240px;
      font-weight: bold;
      color: #555;
      text-align: right;
      font-size: 15px;
    }

    .bar-area {
      flex: 1;
      background: #eee;
      height: 34px;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
    }

    .bar {
      height: 100%;
      background: #ff0000;
      border-radius: 20px;
      min-width: 34px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      color: #fff;
      font-weight: bold;
      padding-right: 12px;
      box-sizing: border-box;
      white-space: nowrap;
    }

    .count {
      margin-left: 4px;
    }

    .loading {
      text-align: center;
      font-size: 18px;
      color: #666;
      margin: 40px 0;
    }

    .error {
      text-align: center;
      color: #c00;
      font-weight: bold;
      margin: 40px 0;
    }

    .updated {
      text-align: center;
      color: #777;
      font-size: 13px;
      margin-top: 30px;
    }

    @media (max-width: 700px) {
      .bar-row {
        flex-direction: column;
        align-items: stretch;
      }

      .label {
        width: auto;
        text-align: left;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>東西新報 ミタニ市長選 世論調査結果</h1>
    <p class="lead">回答結果をリアルタイムで集計しています。</p>

    <div id="loading" class="loading">読み込み中...</div>
    <div id="error" class="error" style="display:none;">結果を読み込めませんでした。</div>

    <div id="results" style="display:none;">
      <div class="section">
        <h2>回答者の居住地区</h2>
        <div id="district-chart"></div>
      </div>

      <div class="section">
        <h2>最も重要だと思う争点</h2>
        <div id="issue-chart"></div>
      </div>

      <div class="section">
        <h2>支持する候補者</h2>
        <div id="candidate-chart"></div>
      </div>

      <div class="updated" id="updated"></div>
    </div>
  </div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbw9s02wOBPq8rBQooyap_U6r7ZMxXc45zeD1BwVQs2SOUrEqeM4cmwv_AF24NrnE4DR/exec';

    async function loadResults() {
      const loading = document.getElementById('loading');
      const error = document.getElementById('error');
      const results = document.getElementById('results');

      try {
        const response = await fetch(GAS_URL);
        const data = await response.json();

        renderChart('district-chart', data.district);
        renderChart('issue-chart', data.issue);
        renderChart('candidate-chart', data.candidate);

        document.getElementById('updated').textContent =
          '最終更新：' + new Date().toLocaleString('ja-JP');

        loading.style.display = 'none';
        error.style.display = 'none';
        results.style.display = 'block';

      } catch (e) {
        loading.style.display = 'none';
        error.style.display = 'block';
      }
    }

    function renderChart(elementId, counts) {
      const container = document.getElementById(elementId);
      container.innerHTML = '';

      const entries = Object.entries(counts || {});

      if (entries.length === 0) {
        container.innerHTML = '<p style="text-align:center; color:#777;">まだ回答がありません。</p>';
        return;
      }

      entries.sort((a, b) => b[1] - a[1]);

      const max = Math.max(...entries.map(entry => entry[1]));

      entries.forEach(([label, count]) => {
        const percent = max === 0 ? 0 : (count / max) * 100;

        const row = document.createElement('div');
        row.className = 'bar-row';

        const labelDiv = document.createElement('div');
        labelDiv.className = 'label';
        labelDiv.textContent = label;

        const barArea = document.createElement('div');
        barArea.className = 'bar-area';

        const bar = document.createElement('div');
        bar.className = 'bar';
        bar.style.width = percent + '%';
        bar.innerHTML = `<span>${count}<span class="count">🌸</span></span>`;

        barArea.appendChild(bar);
        row.appendChild(labelDiv);
        row.appendChild(barArea);
        container.appendChild(row);
      });
    }

    loadResults();

    setInterval(loadResults, 10000);
  </script>
</body>
</html>
